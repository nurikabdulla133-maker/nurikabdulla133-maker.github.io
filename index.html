<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://googleapis.com"></script>
    <style>
        body { margin: 0; }
        model-viewer { width: 100%; height: 100vh; background-color: #fafafa; }
    </style>
</head>
<body>

    <model-viewer 
        src="./beehive.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        auto-rotate
        alt="3D Beehive Model">
        
        <button slot="ar-button" style="background: #ffcc00; border: none; border-radius: 10px; padding: 15px; position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);">
            AR КӨРУ
        </button>

    </model-viewer>

</body>
</html>
