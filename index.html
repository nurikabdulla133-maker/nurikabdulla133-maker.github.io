<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Модель Көру</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f0f0f0; }
        /* Модельдің өлшемі */
        model-viewer {
            width: 100%;
            height: 90vh;
            background-color: #ffffff;
        }
    </style>
</head>
<body>

    <!-- 3D модельді көрсететін тег -->
    <!-- src бөлігіне кез келген .glb файл сілтемесін қоюға болады -->
    <model-viewer 
        src="https://modelviewer.dev" 
        alt="3D Astronaut модель"
        auto-rotate 
        camera-controls 
        ar 
        shadow-intensity="1">
    </model-viewer>

    <!-- Google-дың дайын скриптін қосу -->
    <script type="module" src="https://googleapis.com"></script>

</body>
</html>
