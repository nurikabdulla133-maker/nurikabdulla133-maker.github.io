<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <title>3D Жиһаз WebAR</title>
    <script type="module" src="https://googleapis.com"></script>
    <style>
        body { font-family: sans-serif; text-align: center; }
        model-viewer { width: 100%; height: 500px; background-color: #f0f0f0; }
    </style>
</head>
<body>
    <h1>Менің 3D жиһаздарым</h1>
    <p>Төменде Blender-ден жүктелген модель пайда болады:</p>

    <model-viewer 
        src="model.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1">
        <button slot="ar-button" style="background: white; border-radius: 4px; padding: 10px; position: absolute; top: 10px; right: 10px;">
            🏠 AR-да көру
        </button>
    </model-viewer>
</body>
</html>
