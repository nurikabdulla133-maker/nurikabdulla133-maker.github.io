<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ғарыш әлемі</title>
    <style>
        body {
            margin: 0;
            background: #0a0a1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        /* Ғарышкер анимациясы */
        .astronaut {
            font-size: 100px;
            margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(15deg); }
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #fff;
            text-align: center;
        }

        /* Жұлдыздар */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(white, transparent 10%), 
                        radial-gradient(white, transparent 10%);
            background-size: 50px 50px;
            background-position: 0 0, 25px 25px;
            opacity: 0.3;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="astronaut">👨‍🚀</div>
    <h1>ҒАРЫШ ӘЛЕМІ</h1>
</body>
</html>
