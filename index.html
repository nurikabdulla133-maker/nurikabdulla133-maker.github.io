<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebAR Жиһаз</title>
    <!-- 3D модельді көрсетуге арналған скрипт -->
    <script type="module" src="https://googleapis.com"></script>
    <style>
        body { margin: 0; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #f5f5f5; }
        h1 { font-size: 20px; color: #333; margin-bottom: 10px; }
        model-viewer {
            width: 90%;
            height: 70vh;
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .ar-button {
            background-color: #007bff;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            position: absolute;
            bottom: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Менің алғашқы WebAR жиһазым</h1>

    <!-- src бөліміне дайын модель сілтемесін қойдым -->
    <model-viewer 
        src="https://modelviewer.dev" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        auto-rotate 
        shadow-intensity="1">
        
        <button slot="ar-button" class="ar-button">
            Бөлмеге қойып көру (AR)
        </button>
    </model-viewer>

    <p style="margin-top: 15px; color: #777;">Телефонмен ашып, AR батырмасын басыңыз</p>

</body>
</html>
