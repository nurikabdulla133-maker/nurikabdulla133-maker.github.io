<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Beehive WebAR</title>
    
    <!-- Google-дың 3D модельдерді көрсетуге арналған скрипті -->
    <script type="module" src="https://googleapis.com"></script>

    <style>
        body {
            margin: 0;
            background-color: #f7f7f7;
            font-family: sans-serif;
        }
        /* Модельді экранға толық шығару */
        model-viewer {
            width: 100%;
            height: 100vh;
            --poster-color: transparent;
        }
        /* AR түймесінің стилі */
        .ar-button {
            background-color: #ffcc00;
            border-radius: 20px;
            border: none;
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            font-weight: bold;
            color: #333;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- 3D модель коды -->
    <model-viewer 
        src="./beehive.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        auto-rotate 
        environment-image="neutral">
        
        <button slot="ar-button" class="ar-button">
            Бөлмеге орналастыру (AR)
        </button>

        <div id="annotation" style="position: absolute; top: 10px; left: 10px; background: white; padding: 5px; border-radius: 5px; font-size: 12px;">
            Модельді айналдыру үшін саусақпен басыңыз
        </div>
    </model-viewer>

</body>
</html>
